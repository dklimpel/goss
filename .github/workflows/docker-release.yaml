name: Create docker images and push to ghcr.io

on:
  push:
    branches:
      - master
      - build_docker_dev
  workflow_dispatch:

jobs:
  list-dockerfiles:
    name: Create list of existing dockerfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Get file list
        id: set-matrix
        run: |
          # lists all Dockerfile_* and ignore (grep) files with extension (e.g. *.md5)
          # tranforms the file list in JSON array (StackOverflow#10234327)
          # convert the list into objects of dockerfile and image name
          ls integration-tests/Dockerfile_* |
            grep -Ev "\..{0,3}$" |
            jq -R -s 'split("\n")[:-1]' |
            jq '. | map({dockerfile: ., image: sub(".*_"; "")})' > filelist.json
          jq . filelist.json
          jq -r . filelist.json
          echo "matrix=$(jq -c . filelist.json)" >> "$GITHUB_OUTPUT"
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

  docker:
    needs: [list-dockerfiles]
    name: Push Docker image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        manifest: ${{ fromJson(needs.list-dockerfiles.outputs.matrix) }}
    permissions:
      packages: write
      contents: read

    steps:
      - name: debug
        run: echo "${{ matrix."image" }}"
      - run: echo "${{ matrix }}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}

      - name: Build and Push Tag
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64